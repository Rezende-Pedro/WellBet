<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellBet</title>
    <link rel="stylesheet" href="./src/css/estilo.css">
    <!-- fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Jaini+Purva&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1 id="logo">WellBet 2026</h1>
    </header>

    <main id="content">
    <h2>Próximas Partidas</h2>
    
    <div class="cards-grid">
        
        <section class="card">
            <div class="card-palpite">
                <article class="card-content">
                    <p class="top-card">Brasil VS Haiti</p>
                    <p class="day">19/06 - 21:00</p>
                    <div class="bet">
                        <input class="palpite" type="number" min="1" id="time1-1">
                        <input class="palpite" type="number" min="1" id="time1-2">
                    </div>
                    
                    <button onclick="salvarPalpite('Brasil vs Haiti',1)" class="btn-palpite">PALPITE</button>
                </article>
            </div>
        </section>

        <section class="card">
            <div class="card-palpite">
                <article class="card-content">
                    <p class="top-card">Holanda VS Japão</p>
                    <p class="day">15/06 - 16:00</p>
                    <div class="bet">
                        <input class="palpite" type="number" min="1" max="10" id="time2-1">
                        <input class="palpite" type="number" min="1" max="10" id="time2-2">
                    </div>
                    <button onclick="salvarPalpite('Holanda vs Japão',2)" class="btn-palpite">PALPITE</button>
                </article>
            </div>
        </section>

    </div>
    <h2>Histórico de Palpites</h2>
    </main>

    <footer>
        <p id="copy">&copy;-2026-BOLÃO</p>
    </footer>

    <!-- JS externo -->
     <script src="./src/js/script.js"></script>
</body>
</html>
